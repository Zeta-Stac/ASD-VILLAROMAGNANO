name: Pubblica su GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.123.7"
          extended: true

      - name: Configura GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Genera il sito
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Carica il sito generato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Pubblica su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
