eventi:
  - anno: "1978"
    titolo: "Fondazione"
    testo: "Un gruppo di amici del bar dello sport fonda ufficialmente la società, iscrivendola al campionato di Terza Categoria."
  - anno: "1985"
    titolo: "Primo Stadio"
    testo: "Inaugurazione del campo comunale, tuttora casa della squadra."
  - anno: "1994"
    titolo: "Prima Promozione"
    testo: "Salto in Seconda Categoria dopo un campionato dominato dalla prima all'ultima giornata."
  - anno: "2003"
    titolo: "Anni Difficili"
    testo: "Retrocessione e ripartenza dal settore giovanile, che diventa il fulcro del progetto societario."
  - anno: "2019"
    titolo: "Nuovo Centro Sportivo"
    testo: "Apertura degli spogliatoi rinnovati, finanziati con il contributo dei soci e degli sponsor locali."
  - anno: "2024"
    titolo: "Ritorno in Seconda Categoria"
    testo: "Promozione ottenuta da capolista, chiudendo un ciclo di ricostruzione durato cinque stagioni."

bacheca:
  - "1 x Campione Terza Categoria (2023/2024)"
  - "2 x Coppa Provinciale (1996, 2011)"
  - "1 x Torneo Amichevole di Ferragosto (2018)"
