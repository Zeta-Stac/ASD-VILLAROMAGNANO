<header class="site-header">
  <div class="site-header__inner">
    <a class="crest" href="{{ "/" | relURL }}">
      <span class="crest__badge" aria-hidden="true">
        <svg viewBox="0 0 100 100" width="44" height="44">
          <polygon points="50,4 92,26 92,68 50,96 8,68 8,26" fill="none" stroke="currentColor" stroke-width="4"/>
          <line x1="50" y1="18" x2="50" y2="82" stroke="currentColor" stroke-width="2"/>
          <line x1="20" y1="35" x2="80" y2="35" stroke="currentColor" stroke-width="2"/>
        </svg>
      </span>
      <span class="crest__text">
        <span class="crest__name">{{ .Site.Params.nomeSquadra }}</span>
        <span class="crest__sub">{{ .Site.Params.sottotitolo }}</span>
      </span>
    </a>
    <nav class="main-nav" aria-label="Navigazione principale">
      <ul>
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL | relURL }}" {{ if eq $.Section (strings.TrimSuffix "/" (strings.TrimPrefix "/" .URL)) }}aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
